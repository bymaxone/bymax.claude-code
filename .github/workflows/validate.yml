name: validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Validate marketplace + plugins
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Claude Code
        # validate.sh delegates marketplace and plugin checks to `claude plugin validate`
        # so the validation tracks whatever schema the installed CLI expects.
        run: npm install -g @anthropic-ai/claude-code

      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Run validate.sh
        # Delegates to `claude plugin validate` for marketplace/plugin manifests, then
        # checks shell-script executable bits, shellcheck, and required project files.
        run: ./scripts/validate.sh
